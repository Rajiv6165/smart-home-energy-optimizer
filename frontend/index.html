<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Home Energy Optimizer</title>
  <meta name="description" content="AI-Powered HVAC Optimizer, Carbon footprint tracking, and Home Energy Insights." />
  
  <!-- CSS Styling & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- CDNs for React, ReactDOM, Recharts, Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#060B17',
              900: '#0A0F1E',
              800: '#0D1528',
              700: '#121C33',
              600: '#1E2D54',
              500: '#2A3E75'
            },
            teal: {
              400: '#2DDCB5',
              500: '#00D4AA',
              600: '#00B891'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>

  <style>
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: #060B17;
      color: #E2E8F0;
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(13, 21, 40, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
    }
    .active-nav {
      background: rgba(0, 212, 170, 0.12);
      color: #00D4AA;
      border-left: 3px solid #00D4AA;
    }
    @keyframes float-bubble {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
      50% { transform: translateY(-40px) translateX(20px); opacity: 0.45; }
      100% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 212, 170, 0.25), transparent);
      filter: blur(12px);
      animation: float-bubble 10s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 170, 0.4); }
      50% { box-shadow: 0 0 25px rgba(0, 212, 170, 0.8); }
    }
    .chatbot-glow {
      animation: pulse-glow 2s infinite;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #060B17;
    }
    ::-webkit-scrollbar-thumb {
      background: #1E2D54;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00D4AA;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden">
  <div id="root"></div>

  <!-- React Application Source (Transpiled by Babel) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { ResponsiveContainer, AreaChart, Area, LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = Recharts;

    const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
      ? 'http://localhost:8000'
      : window.location.origin;

    function App() {
      // Auth State
      const [token, setToken] = useState(localStorage.getItem('jwt_token') || '');
      const [email, setEmail] = useState(localStorage.getItem('jwt_email') || '');
      const [viewMode, setViewMode] = useState(localStorage.getItem('jwt_token') ? 'dashboard' : 'landing'); // 'landing', 'login', 'dashboard'
      const [authMode, setAuthMode] = useState('login'); // 'login' or 'register'
      const [authName, setAuthName] = useState('');
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [authError, setAuthError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [successAnimation, setSuccessAnimation] = useState(false);

      // Collapsible Sidebar
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

      // Chatbot State
      const [chatOpen, setChatOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [chatLoading, setChatLoading] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState(localStorage.getItem('anthropic_api_key') || '');
      const [showApiKeySetting, setShowApiKeySetting] = useState(false);

      // Alerts State
      const [alerts, setAlerts] = useState([]);
      const [bellOpen, setBellOpen] = useState(false);
      const [alertsFilter, setAlertsFilter] = useState('All');
      const [wsConnected, setWsConnected] = useState(false);

      // Analytics State
      const [weeklySummary, setWeeklySummary] = useState([]);
      const [savingsTotal, setSavingsTotal] = useState(null);
      const [zoneComparison, setZoneComparison] = useState([]);

      // Zone Map State
      const [expandedZone, setExpandedZone] = useState(null);
      const [sparklineData, setSparklineData] = useState({});

      // Schedule History State
      const [scheduleHistory, setScheduleHistory] = useState([]);
      const [expandedRunId, setExpandedRunId] = useState(null);

      // Data States
      const [activeTab, setActiveTab] = useState('dashboard');
      const [schedule, setSchedule] = useState(null);
      const [sensors, setSensors] = useState([]);
      const [latestReadings, setLatestReadings] = useState({});
      const [tips, setTips] = useState([]);
      const [weather, setWeather] = useState([]);
      const [loading, setLoading] = useState(false);
      const [optLoading, setOptLoading] = useState(false);
      const [weatherRefreshLoading, setWeatherRefreshLoading] = useState(false);
      const [error, setError] = useState('');
      const [toasts, setToasts] = useState([]);

      // Auto Refresh Timer states
      const [secondsSinceUpdate, setSecondsSinceUpdate] = useState(0);

      // Sensor modal form state
      const [isAddSensorOpen, setIsAddSensorOpen] = useState(false);
      const [newSensorName, setNewSensorName] = useState('');
      const [newSensorZone, setNewSensorZone] = useState('bedroom');
      const [newSensorKind, setNewSensorKind] = useState('temperature');
      const [newSensorUnits, setNewSensorUnits] = useState('C');
      const [sensorAdding, setSensorAdding] = useState(false);

      // Inline post reading state
      const [activeReadingInputSensorId, setActiveReadingInputSensorId] = useState(null);
      const [postValueMap, setPostValueMap] = useState({});

      // Recommendation Filter category state
      const [recommendationCategory, setRecommendationCategory] = useState('All');

      // Scroll ref for chat log autoscroll
      const chatEndRef = useRef(null);

      // Trigger standard API request helper
      async function request(path, options) {
        const url = API_BASE + path;
        const defaultHeaders = {
          'Content-Type': 'application/json'
        };
        if (token) {
          defaultHeaders['Authorization'] = 'Bearer ' + token;
        }

        const fetchOptions = Object.assign({ headers: defaultHeaders }, options);
        const res = await fetch(url, fetchOptions);
        
        if (res.status === 401) {
          handleLogout();
          throw new Error('Session expired. Please sign in again.');
        }

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          const errMsg = body && body.detail ? body.detail : 'An error occurred';
          throw new Error(errMsg);
        }

        return res.json();
      }

      // Show temporary toast notification (handles multiple toasts concurrently)
      function showToast(message, type) {
        const newId = Date.now() + Math.random();
        const newToast = { id: newId, message: message, type: type || 'success' };
        setToasts(function(currentToasts) {
          return currentToasts.concat([newToast]);
        });
        setTimeout(function() {
          setToasts(function(currentToasts) {
            return currentToasts.filter(function(t) { return t.id !== newId; });
          });
        }, 4000);
      }

      // Fetch all latest readings for sensors
      async function fetchLatestReadings(sensorList) {
        const readingsObj = {};
        const promises = sensorList.map(async (sensor) => {
          try {
            const res = await request('/sensors/' + sensor.id + '/readings?limit=1');
            if (res && res.data && res.data.length > 0) {
              readingsObj[sensor.id] = res.data[0];
            }
          } catch (e) {
            console.error('Error fetching reading for sensor ' + sensor.id, e);
          }
        });
        await Promise.all(promises);
        setLatestReadings(readingsObj);
      }

      // Fetch alerts
      async function fetchAlerts() {
        if (!token) return;
        try {
          const res = await request('/alerts');
          if (res && res.data) {
            setAlerts(res.data);
          }
        } catch (e) {
          console.error('Error fetching alerts', e);
        }
      }

      // Mark single alert read
      async function handleMarkRead(alertId) {
        try {
          const res = await request('/alerts/mark-read/' + alertId, { method: 'POST' });
          if (res && res.data) {
            setAlerts(prev => prev.map(a => a.id === alertId ? res.data : a));
            showToast('Alert marked as read', 'success');
          }
        } catch (err) {
          showToast(err.message || 'Failed to mark alert as read', 'error');
        }
      }

      // Mark all read
      async function handleMarkAllRead() {
        try {
          const res = await request('/alerts/mark-all-read', { method: 'POST' });
          if (res && res.data) {
            setAlerts(prev => prev.map(a => Object.assign({}, a, { is_read: true })));
            showToast('All alerts marked as read', 'success');
          }
        } catch (err) {
          showToast(err.message || 'Failed to mark all as read', 'error');
        }
      }

      // Delete single alert
      async function handleDeleteAlert(alertId) {
        try {
          const res = await request('/alerts/' + alertId, { method: 'DELETE' });
          if (res && res.data) {
            setAlerts(prev => prev.filter(a => a.id !== alertId));
            showToast('Alert successfully deleted', 'success');
          }
        } catch (err) {
          showToast(err.message || 'Failed to delete alert', 'error');
        }
      }

      // Clear all alerts
      async function handleClearAllAlerts() {
        try {
          const promises = alerts.map(a => request('/alerts/' + a.id, { method: 'DELETE' }));
          await Promise.all(promises);
          setAlerts([]);
          showToast('All alerts cleared successfully', 'success');
        } catch (err) {
          showToast(err.message || 'Failed to clear alerts', 'error');
        }
      }

      // Export schedule CSV (Authenticated)
      async function handleExportScheduleCSV() {
        try {
          const res = await fetch(API_BASE + '/export/schedule-csv', {
            headers: {
              'Authorization': 'Bearer ' + token
            }
          });
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
          a.download = `hvac_schedule_${dateStr}.csv`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          showToast('Schedule CSV exported successfully', 'success');
        } catch (err) {
          showToast('Failed to export schedule CSV', 'error');
        }
      }

      // Export analytics CSV (Authenticated)
      async function handleExportAnalyticsCSV() {
        try {
          const res = await fetch(API_BASE + '/export/analytics-csv', {
            headers: {
              'Authorization': 'Bearer ' + token
            }
          });
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
          a.download = `weekly_analytics_${dateStr}.csv`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          showToast('Analytics CSV exported successfully', 'success');
        } catch (err) {
          showToast('Failed to export analytics CSV', 'error');
        }
      }

      // Export a specific historical run as CSV client-side
      function downloadRunCSV(run) {
        if (!run || !run.blocks) {
          showToast('No block data available to export', 'error');
          return;
        }
        try {
          let csvContent = "timestamp,target_temp_c,target_hvac_mode,estimated_kwh,comfort_delta\n";
          run.blocks.forEach(block => {
            csvContent += `${block.timestamp},${block.target_temp_c},${block.target_hvac_mode},${block.estimated_kwh},${block.comfort_delta}\n`;
          });
          const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `hvac_schedule_run_${run.run_id}.csv`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          showToast(`Schedule run #${run.run_id} CSV exported successfully`, 'success');
        } catch (err) {
          showToast('Failed to export historical run CSV', 'error');
        }
      }

      // Fetch sparkline data for zone sensors
      async function fetchZoneSparklines(zoneSensors) {
        if (!zoneSensors || zoneSensors.length === 0) return;
        const copy = Object.assign({}, sparklineData);
        const promises = zoneSensors.map(async (sensor) => {
          try {
            const res = await request('/analytics/sensor-history/' + sensor.id + '?hours=24');
            if (res && res.data) {
              copy[sensor.id] = res.data.map(d => ({ value: d.value }));
            }
          } catch (e) {
            console.error('Error fetching sparkline data for sensor ' + sensor.id, e);
          }
        });
        await Promise.all(promises);
        setSparklineData(copy);
      }

      // Fetch all dashboard data
      async function fetchAllData() {
        if (!token) return;
        setLoading(true);
        setError('');
        try {
          const schedRes = await request('/schedules/latest');
          if (schedRes && schedRes.data) {
            setSchedule(schedRes.data);
          }

          const sensorRes = await request('/sensors');
          if (sensorRes && sensorRes.data) {
            setSensors(sensorRes.data);
            fetchLatestReadings(sensorRes.data);
          }

          const tipsRes = await request('/insights/tips');
          if (tipsRes && tipsRes.data) {
            setTips(tipsRes.data);
          }

          const weatherRes = await request('/weather/current');
          if (weatherRes && weatherRes.data) {
            setWeather(weatherRes.data);
          }

          const alertsRes = await request('/alerts');
          if (alertsRes && alertsRes.data) {
            setAlerts(alertsRes.data);
          }

          const weeklyRes = await request('/analytics/weekly-summary');
          if (weeklyRes && weeklyRes.data) {
            setWeeklySummary(weeklyRes.data);
          }

          const savingsRes = await request('/analytics/savings-total');
          if (savingsRes && savingsRes.data) {
            setSavingsTotal(savingsRes.data);
          }

          const zoneCompRes = await request('/analytics/zone-comparison');
          if (zoneCompRes && zoneCompRes.data) {
            setZoneComparison(zoneCompRes.data);
          }

          const historyRes = await request('/schedules/history?limit=25');
          if (historyRes && historyRes.data) {
            setScheduleHistory(historyRes.data);
          }

          setSecondsSinceUpdate(0);
        } catch (err) {
          setError(err.message || 'Failed to load data');
          showToast(err.message || 'Data retrieval failed', 'error');
        } finally {
          setLoading(false);
        }
      }

      // Setup 60-second auto-refresh and elapsed counter
      useEffect(() => {
        if (!token) return;
        
        fetchAllData();

        const timer = setInterval(() => {
          setSecondsSinceUpdate(function(prev) {
            if (prev >= 59) {
              fetchAllData();
              return 0;
            }
            return prev + 1;
          });
        }, 1000);

        return () => clearInterval(timer);
      }, [token]);

      // WebSocket Live Feed connection manager
      useEffect(() => {
        if (!token) {
          setWsConnected(false);
          return;
        }

        let ws;
        let reconnectTimeout;
        let reconnectDelay = 1000;

        function connectWS() {
          const wsUrl = (API_BASE.replace('http://', 'ws://').replace('https://', 'wss://')) + '/ws/live-feed?room=all';
          console.log('Connecting to WebSocket live feed:', wsUrl);
          ws = new WebSocket(wsUrl);

          ws.onopen = () => {
            console.log('WebSocket connection established.');
            setWsConnected(true);
            reconnectDelay = 1000;
          };

          ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              console.log('WS Message received:', msg);
              if (msg.type === 'new_alert') {
                showToast('🚨 ' + msg.data.title + ': ' + msg.data.message, 'warning');
                fetchAlerts();
              } else if (msg.type === 'sensor_reading') {
                const reading = msg.data;
                setLatestReadings(prev => {
                  const copy = Object.assign({}, prev);
                  copy[reading.sensor_id] = reading;
                  return copy;
                });
                
                const rowEl = document.getElementById('sensor-row-' + reading.sensor_id);
                if (rowEl) {
                  rowEl.classList.add('bg-teal-500/10');
                  setTimeout(() => {
                    rowEl.classList.remove('bg-teal-500/10');
                  }, 1000);
                }
              } else if (msg.type === 'schedule_updated') {
                showToast('📅 New schedule generated by optimizer!', 'success');
                request('/schedules/latest').then(res => {
                  if (res && res.data) setSchedule(res.data);
                });
              }
            } catch (e) {
              console.error('Error handling WebSocket message', e);
            }
          };

          ws.onclose = () => {
            console.log('WebSocket connection closed.');
            setWsConnected(false);
            reconnectTimeout = setTimeout(() => {
              console.log(`Reconnecting to WebSocket (attempting in ${reconnectDelay}ms)...`);
              reconnectDelay = Math.min(reconnectDelay * 2, 30000);
              connectWS();
            }, reconnectDelay);
          };

          ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            ws.close();
          };
        }

        connectWS();

        return () => {
          if (ws) ws.close();
          clearTimeout(reconnectTimeout);
        };
      }, [token]);

      // Autoscroll chat
      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages, chatLoading]);

      // Save API key
      function saveApiKey(key) {
        localStorage.setItem('anthropic_api_key', key);
        setApiKeyInput(key);
        showToast('Anthropic API Key saved locally!', 'success');
        setShowApiKeySetting(false);
      }

      // Chat Bot Submit
      async function handleSendChat(textToSend) {
        const inputMsg = textToSend || chatInput;
        if (!inputMsg.trim()) return;

        // Add user message to state
        const updatedMessages = messages.concat([{ role: 'user', content: inputMsg }]);
        setMessages(updatedMessages);
        setChatInput('');
        setChatLoading(true);

        const systemPrompt = "You are an AI energy assistant for a Smart Home Energy Optimizer application. You have expert knowledge about:\n- The user's home has sensors in bedroom, living_room, office, and panel zones\n- The system uses FastAPI backend with SQLModel/SQLite\n- It pulls weather from Open-Meteo API every 60 minutes\n- The AI optimizer computes 24h HVAC schedules using thermal models\n- Carbon footprint uses 0.386 kg CO2 per kWh\n- Comfort band is 20.5°C to 23.5°C\n- The system tracks temperature, occupancy, power sensors\n\nYou can help users with:\n- Explaining their energy usage and recommendations\n- Answering questions about their HVAC schedule\n- Giving tips to save energy\n- Explaining what comfort score and cost efficiency mean\n- Answering questions about carbon footprint\n- Explaining how the optimization algorithm works\n\nKeep responses concise, friendly, and focused on energy saving. Use bullet points for clarity.";

        // Predefined fallbacks in case API Key is missing or CORS blocks the request
        const localMockAnswers = {
          "how does the optimizer work?": "The AI Optimizer uses a thermal dynamics model of your home combined with the 24-hour weather forecast from Open-Meteo. It calculates the heat transfer through walls and windows, then schedules HVAC heating or cooling blocks to run during periods of mild outdoor temperature. By pre-cooling or pre-heating before tariff peak hours and accounting for occupancy, it reduces overall grid draw while keeping the indoor temperature within the comfort band (20.5°C to 23.5°C).",
          "why is my comfort score low?": "A low comfort score means the indoor temperature has deviated from the target comfort band (20.5°C to 23.5°C). This can happen during:\n- Extreme outdoor weather where the HVAC cannot keep up.\n- Unoccupied periods where the optimizer intentionally lets the temperature drift to save energy.\n- System calibration issues with sensor readings.",
          "how can i save more energy?": "Here are top tips:\n- Narrow your comfort band during unoccupied hours.\n- Enable predictive pre-cooling before heat peaks.\n- Adjust setpoints by 1°C; each degree can save up to 6% in HVAC power.\n- Seal windows in zones showing high deviation (e.g. living room).",
          "what does carbon footprint mean?": "Your carbon footprint represents the greenhouse gas emissions generated by your electricity usage. The system assumes a grid carbon intensity of **0.386 kg CO₂ per kWh** (US average). The optimizer tracks how many kilograms of CO₂ are prevented by reducing grid consumption during optimization runs.",
          "explain my current schedule": "The optimizer divides the day into 24 hourly blocks. For each block, it sets a target temperature and mode (COOL/HEAT/OFF). It shifts high-load operations to off-peak tariff periods or times with cooler outdoor temperatures to maximize efficiency."
        };

        const normalizedInput = inputMsg.toLowerCase().trim();
        const apiKey = apiKeyInput || localStorage.getItem('anthropic_api_key');

        // Check if we should fallback directly (no key)
        if (!apiKey) {
          setTimeout(() => {
            let reply = "Direct browser requests to Anthropic API are blocked by CORS policies. However, I can still assist you! Here is the information on your query:\n\n";
            let matched = false;
            
            Object.keys(localMockAnswers).forEach(key => {
              if (normalizedInput.includes(key) || key.includes(normalizedInput)) {
                reply += localMockAnswers[key];
                matched = true;
              }
            });

            if (!matched) {
              reply += "I'm your AI Energy Assistant. To use the live Anthropic Claude model directly from your browser, click the gear icon above and enter your Anthropic API Key. Otherwise, you can ask about: \n- 'How does the optimizer work?'\n- 'Why is my comfort score low?'\n- 'How can I save more energy?'\n- 'What does carbon footprint mean?'\n- 'Explain my current schedule'";
            }

            setMessages(updatedMessages.concat([{ role: 'assistant', content: reply }]));
            setChatLoading(false);
          }, 1000);
          return;
        }

        // Attempt actual Anthropic API call
        try {
          const apiMessages = updatedMessages.map(m => ({ role: m.role, content: m.content }));
          
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerously-allow-browser": "true"
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022", // Use standard Sonnet 3.5 model identifier
              max_tokens: 1000,
              system: systemPrompt,
              messages: apiMessages
            })
          });

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData && errData.error && errData.error.message ? errData.error.message : 'API call failed');
          }

          const resData = await res.json();
          const assistantReply = resData && resData.content && resData.content[0] && resData.content[0].text
            ? resData.content[0].text
            : 'No response text received.';

          setMessages(updatedMessages.concat([{ role: 'assistant', content: assistantReply }]));
        } catch (err) {
          // Handle API errors / CORS blocks gracefully by falling back to local mocks
          console.error(err);
          let fallbackReply = "CORS restriction or API Key error detected. Falling back to local assistant knowledge:\n\n";
          let matched = false;

          Object.keys(localMockAnswers).forEach(key => {
            if (normalizedInput.includes(key) || key.includes(normalizedInput)) {
              fallbackReply += localMockAnswers[key];
              matched = true;
            }
          });

          if (!matched) {

            body: JSON.stringify({ email: authEmail, password: authPassword })

          if (res && res.access_token) {
            setSuccessAnimation(true);
            setTimeout(() => {
              localStorage.setItem('jwt_token', res.access_token);
              localStorage.setItem('jwt_email', res.email);
              setToken(res.access_token);
              setEmail(res.email);

              showToast('Access granted! Welcome ' + (authName || res.email), 'success');
              setAuthName('');
              setAuthEmail('');
              setAuthPassword('');

          setAuthError(err.message || 'Authentication failed');

          setAuthLoading(false);

                      <button
                        key={q}
                        onClick={() => handleSendChat(q)}
                        className="w-full text-left bg-navy-900 border border-slate-800/80 rounded-xl px-4 py-2 text-[11px] text-teal-400 hover:bg-teal-500/10 hover:border-teal-500/30 transition-all font-medium"
                      >
                        {q}
                      </button>
                    ))}
                  </div>
                )}

                {/* Message list bubble elements */}
                {messages.map((m, idx) => {
                  const isUser = m.role === 'user';
                  return (
                    <div key={idx} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] rounded-2xl px-4 py-2.5 text-xs leading-relaxed whitespace-pre-wrap ${isUser ? 'bg-teal-500 text-navy-950 font-medium' : 'bg-navy-900 border border-slate-800 text-slate-200'}`}>
                        {m.content}
                      </div>
                    </div>
                  );
                })}

                {/* Typing status indicator */}
                {chatLoading && (
                  <div className="flex justify-start">
                    <div className="bg-navy-900 border border-slate-800 rounded-2xl px-4 py-2 text-xs flex gap-1 items-center">
                      <span className="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style={{ animationDelay: '0s' }} />
                      <span className="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }} />
                      <span className="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }} />
                    </div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              {/* Input bottom area */}
              <div className="p-3 border-t border-slate-800 bg-navy-900 flex gap-2">
                <input
                  type="text"
                  value={chatInput}
                  onChange={(e) => setChatInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleSendChat(); }}
                  placeholder="Ask a question..."
                  disabled={chatLoading}
                  className="flex-1 bg-navy-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-teal-500"
                />
                <button
                  onClick={() => handleSendChat()}
                  disabled={chatLoading}
                  className="bg-teal-500 hover:bg-teal-400 text-navy-950 font-bold px-3 py-2 rounded-xl text-xs flex items-center justify-center transition-all disabled:opacity-50"
                >
                  Send
                </button>
              </div>

            </div>
          )}

          {/* Floating trigger CTA button */}
          <button
            onClick={() => setChatOpen(!chatOpen)}
            className="w-14 h-14 rounded-full bg-teal-500 text-navy-950 font-bold text-xl flex items-center justify-center shadow-2xl transition-all active:scale-95 focus:outline-none chatbot-glow cursor-pointer relative z-50 hover:bg-teal-400"
          >
            {chatOpen ? '✕' : '🤖'}
          </button>

        </div>
      );
    }

    // Mount application to DOM root element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
