<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Home Energy Optimizer</title>
  <meta name="description" content="AI-Powered HVAC Optimizer, Carbon footprint tracking, and Home Energy Insights." />
  
  <!-- CSS Styling & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- CDNs for React, ReactDOM, Recharts, Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#060B17',
              900: '#0A0F1E',
              800: '#0D1528',
              700: '#121C33',
              600: '#1E2D54',
              500: '#2A3E75'
            },
            teal: {
              400: '#2DDCB5',
              500: '#00D4AA',
              600: '#00B891'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>

  <style>
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: #060B17;
      color: #E2E8F0;
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(13, 21, 40, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
    }
    .active-nav {
      background: rgba(0, 212, 170, 0.12);
      color: #00D4AA;
      border-left: 3px solid #00D4AA;
    }
    @keyframes float-bubble {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
      50% { transform: translateY(-40px) translateX(20px); opacity: 0.45; }
      100% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 212, 170, 0.25), transparent);
      filter: blur(12px);
      animation: float-bubble 10s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 170, 0.4); }
      50% { box-shadow: 0 0 25px rgba(0, 212, 170, 0.8); }
    }
    .chatbot-glow {
      animation: pulse-glow 2s infinite;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #060B17;
    }
    ::-webkit-scrollbar-thumb {
      background: #1E2D54;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00D4AA;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden">
  <div id="root"></div>

  <!-- React Application Source (Transpiled by Babel) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { ResponsiveContainer, AreaChart, Area, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = Recharts;

    const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
      ? 'http://localhost:8000'
      : window.location.origin;

    function App() {
      // Auth State
      const [token, setToken] = useState(localStorage.getItem('jwt_token') || '');
      const [email, setEmail] = useState(localStorage.getItem('jwt_email') || '');
      const [viewMode, setViewMode] = useState(localStorage.getItem('jwt_token') ? 'dashboard' : 'landing'); // 'landing', 'login', 'dashboard'
      const [authMode, setAuthMode] = useState('login'); // 'login' or 'register'
      const [authName, setAuthName] = useState('');
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [authError, setAuthError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [successAnimation, setSuccessAnimation] = useState(false);

      // Collapsible Sidebar
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

      // Chatbot State
      const [chatOpen, setChatOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [chatLoading, setChatLoading] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState(localStorage.getItem('anthropic_api_key') || '');
      const [showApiKeySetting, setShowApiKeySetting] = useState(false);

      // Data States
      const [activeTab, setActiveTab] = useState('dashboard');
      const [schedule, setSchedule] = useState(null);
      const [sensors, setSensors] = useState([]);
      const [latestReadings, setLatestReadings] = useState({});
      const [tips, setTips] = useState([]);
      const [weather, setWeather] = useState([]);
      const [loading, setLoading] = useState(false);
      const [optLoading, setOptLoading] = useState(false);
      const [weatherRefreshLoading, setWeatherRefreshLoading] = useState(false);
      const [error, setError] = useState('');
      const [toasts, setToasts] = useState([]);

      // Auto Refresh Timer states
      const [secondsSinceUpdate, setSecondsSinceUpdate] = useState(0);

      // Sensor modal form state
      const [isAddSensorOpen, setIsAddSensorOpen] = useState(false);
      const [newSensorName, setNewSensorName] = useState('');
      const [newSensorZone, setNewSensorZone] = useState('bedroom');
      const [newSensorKind, setNewSensorKind] = useState('temperature');
      const [newSensorUnits, setNewSensorUnits] = useState('C');
      const [sensorAdding, setSensorAdding] = useState(false);

      // Inline post reading state
      const [activeReadingInputSensorId, setActiveReadingInputSensorId] = useState(null);
      const [postValueMap, setPostValueMap] = useState({});

      // Recommendation Filter category state
      const [recommendationCategory, setRecommendationCategory] = useState('All');

      // Scroll ref for chat log autoscroll
      const chatEndRef = useRef(null);

      // Trigger standard API request helper
      async function request(path, options) {
        const url = API_BASE + path;
        const defaultHeaders = {
          'Content-Type': 'application/json'
        };
        if (token) {
          defaultHeaders['Authorization'] = 'Bearer ' + token;
        }

        const fetchOptions = Object.assign({ headers: defaultHeaders }, options);
        const res = await fetch(url, fetchOptions);
        
        if (res.status === 401) {
          handleLogout();
          throw new Error('Session expired. Please sign in again.');
        }

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          const errMsg = body && body.detail ? body.detail : 'An error occurred';
          throw new Error(errMsg);
        }

        return res.json();
      }

      // Show temporary toast notification (handles multiple toasts concurrently)
      function showToast(message, type) {
        const newId = Date.now() + Math.random();
        const newToast = { id: newId, message: message, type: type || 'success' };
        setToasts(function(currentToasts) {
          return currentToasts.concat([newToast]);
        });
        setTimeout(function() {
          setToasts(function(currentToasts) {
            return currentToasts.filter(function(t) { return t.id !== newId; });
          });
        }, 4000);
      }

      // Fetch all latest readings for sensors
      async function fetchLatestReadings(sensorList) {
        const readingsObj = {};
        const promises = sensorList.map(async (sensor) => {
          try {
            const res = await request('/sensors/' + sensor.id + '/readings?limit=1');
            if (res && res.data && res.data.length > 0) {
              readingsObj[sensor.id] = res.data[0];
            }
          } catch (e) {
            console.error('Error fetching reading for sensor ' + sensor.id, e);
          }
        });
        await Promise.all(promises);
        setLatestReadings(readingsObj);
      }

      // Fetch all dashboard data
      async function fetchAllData() {
        if (!token) return;
        setLoading(true);
        setError('');
        try {
          const schedRes = await request('/schedules/latest');
          if (schedRes && schedRes.data) {
            setSchedule(schedRes.data);
          }

          const sensorRes = await request('/sensors');
          if (sensorRes && sensorRes.data) {
            setSensors(sensorRes.data);
            fetchLatestReadings(sensorRes.data);
          }

          const tipsRes = await request('/insights/tips');
          if (tipsRes && tipsRes.data) {
            setTips(tipsRes.data);
          }

          const weatherRes = await request('/weather/current');
          if (weatherRes && weatherRes.data) {
            setWeather(weatherRes.data);
          }

          setSecondsSinceUpdate(0);
        } catch (err) {
          setError(err.message || 'Failed to load data');
          showToast(err.message || 'Data retrieval failed', 'error');
        } finally {
          setLoading(false);
        }
      }

      // Setup 60-second auto-refresh and elapsed counter
      useEffect(() => {
        if (!token) return;
        
        fetchAllData();

        const timer = setInterval(() => {
          setSecondsSinceUpdate(function(prev) {
            if (prev >= 59) {
              fetchAllData();
              return 0;
            }
            return prev + 1;
          });
        }, 1000);

        return () => clearInterval(timer);
      }, [token]);

      // Autoscroll chat
      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages, chatLoading]);

      // Save API key
      function saveApiKey(key) {
        localStorage.setItem('anthropic_api_key', key);
        setApiKeyInput(key);
        showToast('Anthropic API Key saved locally!', 'success');
        setShowApiKeySetting(false);
      }

      // Chat Bot Submit
      async function handleSendChat(textToSend) {
        const inputMsg = textToSend || chatInput;
        if (!inputMsg.trim()) return;

        // Add user message to state
        const updatedMessages = messages.concat([{ role: 'user', content: inputMsg }]);
        setMessages(updatedMessages);
        setChatInput('');
        setChatLoading(true);

        const systemPrompt = "You are an AI energy assistant for a Smart Home Energy Optimizer application. You have expert knowledge about:\n- The user's home has sensors in bedroom, living_room, office, and panel zones\n- The system uses FastAPI backend with SQLModel/SQLite\n- It pulls weather from Open-Meteo API every 60 minutes\n- The AI optimizer computes 24h HVAC schedules using thermal models\n- Carbon footprint uses 0.386 kg CO2 per kWh\n- Comfort band is 20.5°C to 23.5°C\n- The system tracks temperature, occupancy, power sensors\n\nYou can help users with:\n- Explaining their energy usage and recommendations\n- Answering questions about their HVAC schedule\n- Giving tips to save energy\n- Explaining what comfort score and cost efficiency mean\n- Answering questions about carbon footprint\n- Explaining how the optimization algorithm works\n\nKeep responses concise, friendly, and focused on energy saving. Use bullet points for clarity.";

        // Predefined fallbacks in case API Key is missing or CORS blocks the request
        const localMockAnswers = {
          "how does the optimizer work?": "The AI Optimizer uses a thermal dynamics model of your home combined with the 24-hour weather forecast from Open-Meteo. It calculates the heat transfer through walls and windows, then schedules HVAC heating or cooling blocks to run during periods of mild outdoor temperature. By pre-cooling or pre-heating before tariff peak hours and accounting for occupancy, it reduces overall grid draw while keeping the indoor temperature within the comfort band (20.5°C to 23.5°C).",
          "why is my comfort score low?": "A low comfort score means the indoor temperature has deviated from the target comfort band (20.5°C to 23.5°C). This can happen during:\n- Extreme outdoor weather where the HVAC cannot keep up.\n- Unoccupied periods where the optimizer intentionally lets the temperature drift to save energy.\n- System calibration issues with sensor readings.",
          "how can i save more energy?": "Here are top tips:\n- Narrow your comfort band during unoccupied hours.\n- Enable predictive pre-cooling before heat peaks.\n- Adjust setpoints by 1°C; each degree can save up to 6% in HVAC power.\n- Seal windows in zones showing high deviation (e.g. living room).",
          "what does carbon footprint mean?": "Your carbon footprint represents the greenhouse gas emissions generated by your electricity usage. The system assumes a grid carbon intensity of **0.386 kg CO₂ per kWh** (US average). The optimizer tracks how many kilograms of CO₂ are prevented by reducing grid consumption during optimization runs.",
          "explain my current schedule": "The optimizer divides the day into 24 hourly blocks. For each block, it sets a target temperature and mode (COOL/HEAT/OFF). It shifts high-load operations to off-peak tariff periods or times with cooler outdoor temperatures to maximize efficiency."
        };

        const normalizedInput = inputMsg.toLowerCase().trim();
        const apiKey = apiKeyInput || localStorage.getItem('anthropic_api_key');

        // Check if we should fallback directly (no key)
        if (!apiKey) {
          setTimeout(() => {
            let reply = "Direct browser requests to Anthropic API are blocked by CORS policies. However, I can still assist you! Here is the information on your query:\n\n";
            let matched = false;
            
            Object.keys(localMockAnswers).forEach(key => {
              if (normalizedInput.includes(key) || key.includes(normalizedInput)) {
                reply += localMockAnswers[key];
                matched = true;
              }
            });

            if (!matched) {
              reply += "I'm your AI Energy Assistant. To use the live Anthropic Claude model directly from your browser, click the gear icon above and enter your Anthropic API Key. Otherwise, you can ask about: \n- 'How does the optimizer work?'\n- 'Why is my comfort score low?'\n- 'How can I save more energy?'\n- 'What does carbon footprint mean?'\n- 'Explain my current schedule'";
            }

            setMessages(updatedMessages.concat([{ role: 'assistant', content: reply }]));
            setChatLoading(false);
          }, 1000);
          return;
        }

        // Attempt actual Anthropic API call
        try {
          const apiMessages = updatedMessages.map(m => ({ role: m.role, content: m.content }));
          
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerously-allow-browser": "true"
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022", // Use standard Sonnet 3.5 model identifier
              max_tokens: 1000,
              system: systemPrompt,
              messages: apiMessages
            })
          });

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData && errData.error && errData.error.message ? errData.error.message : 'API call failed');
          }

          const resData = await res.json();
          const assistantReply = resData && resData.content && resData.content[0] && resData.content[0].text
            ? resData.content[0].text
            : 'No response text received.';

          setMessages(updatedMessages.concat([{ role: 'assistant', content: assistantReply }]));
        } catch (err) {
          // Handle API errors / CORS blocks gracefully by falling back to local mocks
          console.error(err);
          let fallbackReply = "CORS restriction or API Key error detected. Falling back to local assistant knowledge:\n\n";
          let matched = false;

          Object.keys(localMockAnswers).forEach(key => {
            if (normalizedInput.includes(key) || key.includes(normalizedInput)) {
              fallbackReply += localMockAnswers[key];
              matched = true;
            }
          });

          if (!matched) {
            fallbackReply += "I'm your AI Energy Assistant. Ask me pre-defined topics or clear your API key to use simulated responses. Questions you can try:\n- 'How does the optimizer work?'\n- 'Why is my comfort score low?'\n- 'How can I save more energy?'\n- 'What does carbon footprint mean?'\n- 'Explain my current schedule'";
          }

          setMessages(updatedMessages.concat([{ role: 'assistant', content: fallbackReply }]));
        } finally {
          setChatLoading(false);
        }
      }

      // Authentication actions
      async function handleAuth(e) {
        e.preventDefault();
        setAuthLoading(true);
        setAuthError('');
        try {
          const path = authMode === 'login' ? '/auth/login' : '/auth/register';
          const res = await request(path, {
            method: 'POST',
            body: JSON.stringify({ email: authEmail, password: authPassword })
          });

          if (res && res.access_token) {
            setSuccessAnimation(true);
            setTimeout(() => {
              localStorage.setItem('jwt_token', res.access_token);
              localStorage.setItem('jwt_email', res.email);
              setToken(res.access_token);
              setEmail(res.email);
              setSuccessAnimation(false);
              setViewMode('dashboard');
              showToast('Access granted! Welcome ' + (authName || res.email), 'success');
              setAuthName('');
              setAuthEmail('');
              setAuthPassword('');
            }, 1500);
          }
        } catch (err) {
          setAuthError(err.message || 'Authentication failed');
          showToast(err.message || 'Authentication failed', 'error');
        } finally {
          setAuthLoading(false);
        }
      }

      function handleLogout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('jwt_email');
        setToken('');
        setEmail('');
        setSchedule(null);
        setSensors([]);
        setLatestReadings({});
        setTips([]);
        setWeather([]);
        setViewMode('landing');
        showToast('Signed out successfully', 'info');
      }

      // Optimize actions
      async function handleRunOptimizer() {
        setOptLoading(true);
        try {
          const res = await request('/optimizer/run', { method: 'POST' });
          if (res && res.data) {
            setSchedule(res.data);
            showToast('AI optimizer run complete. Target values updated.', 'success');
            const tipsRes = await request('/insights/tips');
            if (tipsRes && tipsRes.data) setTips(tipsRes.data);
            setSecondsSinceUpdate(0);
          }
        } catch (err) {
          showToast(err.message || 'Optimization trigger failed', 'error');
        } finally {
          setOptLoading(false);
        }
      }

      // Refresh Weather forecast
      async function handleRefreshWeather() {
        setWeatherRefreshLoading(true);
        try {
          const res = await request('/weather/refresh', { method: 'POST' });
          if (res && res.data) {
            showToast('Weather forecast successfully updated!', 'success');
            const weatherRes = await request('/weather/current');
            if (weatherRes && weatherRes.data) {
              setWeather(weatherRes.data);
            }
          }
        } catch (err) {
          showToast(err.message || 'Weather refresh failed', 'error');
        } finally {
          setWeatherRefreshLoading(false);
        }
      }

      // Add New Sensor
      async function handleAddSensor(e) {
        e.preventDefault();
        setSensorAdding(true);
        try {
          const res = await request('/sensors', {
            method: 'POST',
            body: JSON.stringify({
              name: newSensorName,
              zone: newSensorZone,
              kind: newSensorKind,
              units: newSensorUnits
            })
          });

          if (res && res.data) {
            showToast('Sensor "' + newSensorName + '" added successfully!', 'success');
            setIsAddSensorOpen(false);
            setNewSensorName('');
            setNewSensorUnits('C');
            const sensorRes = await request('/sensors');
            if (sensorRes && sensorRes.data) {
              setSensors(sensorRes.data);
              fetchLatestReadings(sensorRes.data);
            }
          }
        } catch (err) {
          showToast(err.message || 'Failed to add sensor', 'error');
        } finally {
          setSensorAdding(false);
        }
      }

      // Post synthetic sensor reading value
      async function handlePostReading(sensorId) {
        const valStr = postValueMap[sensorId];
        const value = parseFloat(valStr);
        if (isNaN(value)) {
          showToast('Please specify a valid numeric coordinate', 'error');
          return;
        }

        try {
          const res = await request('/sensors/' + sensorId + '/readings', {
            method: 'POST',
            body: JSON.stringify({ value: value })
          });
          if (res && res.data) {
            showToast('Reading value successfully ingested!', 'success');
            
            const updatedReadings = Object.assign({}, latestReadings);
            updatedReadings[sensorId] = res.data;
            setLatestReadings(updatedReadings);

            setActiveReadingInputSensorId(null);
            const updatedInputs = Object.assign({}, postValueMap);
            updatedInputs[sensorId] = '';
            setPostValueMap(updatedInputs);
          }
        } catch (err) {
          showToast(err.message || 'Ingestion failed', 'error');
        }
      }

      // Format timestamp helper
      function formatTime(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      // Format full date helper
      function formatDate(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        return date.toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      // Weather condition calculator
      function getWeatherIcon(timestamp, solar) {
        const date = new Date(timestamp);
        const hour = date.getHours();
        if (hour >= 6 && hour < 20) {
          return solar > 300 ? '☀️' : '⛅';
        }
        return '🌙';
      }

      function isCurrentHour(timestamp) {
        const cardDate = new Date(timestamp);
        const nowDate = new Date();
        return cardDate.getDate() === nowDate.getDate() && cardDate.getHours() === nowDate.getHours();
      }

      // Format blocks for Recharts consumption
      const chartData = schedule && schedule.blocks
        ? schedule.blocks.map(b => ({
            time: formatTime(b.timestamp),
            setpoint: b.target_temp_c,
            load: b.estimated_kwh
          }))
        : [];

      // Deduplicate recommendations by title
      const uniqueTips = [];
      const seenTitles = {};
      tips.forEach(t => {
        if (!seenTitles[t.title]) {
          seenTitles[t.title] = true;
          uniqueTips.push(t);
        }
      });

      // Filter tips based on tab selection
      const filteredTips = uniqueTips.filter(t => {
        if (recommendationCategory === 'All') return true;
        return t.category.toLowerCase() === recommendationCategory.toLowerCase();
      });

      // Calculate total potential savings
      let totalPotentialSavings = 0;
      filteredTips.forEach(t => {
        totalPotentialSavings += Math.abs(t.estimated_savings_kwh);
      });

      // Calculations for Dashboard Stats Row
      const totalBlocks = schedule && schedule.blocks ? schedule.blocks.length : 0;
      let avgSetpointVal = 0;
      let peakLoadVal = 0;
      let peakLoadHourStr = '--';
      let activeHvacHours = 0;

      if (schedule && schedule.blocks) {
        let tempSum = 0;
        schedule.blocks.forEach(b => {
          tempSum += b.target_temp_c;
          if (b.estimated_kwh > peakLoadVal) {
            peakLoadVal = b.estimated_kwh;
            peakLoadHourStr = formatTime(b.timestamp);
          }
          if (b.target_hvac_mode !== 'off' && b.target_hvac_mode !== 'auto') {
            activeHvacHours += 1;
          }
        });
        avgSetpointVal = totalBlocks > 0 ? (tempSum / totalBlocks).toFixed(1) : 0;
      }

      // Calculations for Weather summary
      let weatherMinTemp = 999;
      let weatherMaxTemp = -999;
      weather.forEach(w => {
        if (w.temperature_c < weatherMinTemp) weatherMinTemp = w.temperature_c;
        if (w.temperature_c > weatherMaxTemp) weatherMaxTemp = w.temperature_c;
      });

      const todayMinMax = weather.length > 0
        ? "Today: " + weatherMinTemp.toFixed(1) + "°C — " + weatherMaxTemp.toFixed(1) + "°C"
        : "";

      // Group sensors by zone
      const sensorsByZone = {};
      sensors.forEach(s => {
        const zone = s.zone || 'other';
        if (!sensorsByZone[zone]) {
          sensorsByZone[zone] = [];
        }
        sensorsByZone[zone].push(s);
      });

      // ────────────────────────────────────────────────────────
      // RENDER SECTION 1: LANDING PAGE
      // ────────────────────────────────────────────────────────
      if (viewMode === 'landing') {
        return (
          <div className="relative min-h-screen bg-navy-950 text-slate-100 flex flex-col justify-between">
            
            {/* Animated particles in background */}
            <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
              <div className="bubble w-48 h-48 top-20 left-10" style={{ animationDelay: '0s' }}></div>
              <div className="bubble w-72 h-72 bottom-20 right-20" style={{ animationDelay: '-3s' }}></div>
              <div className="bubble w-36 h-36 top-1/2 left-2/3" style={{ animationDelay: '-6s' }}></div>
            </div>

            {/* STICKY TOP NAVBAR */}
            <header className="sticky top-0 z-50 glass-card border-b border-slate-800/80 px-6 py-4 flex items-center justify-between">

      const setShowApiKeySetting = props.setShowApiKeySetting;
      const chatEndRef = props.chatEndRef;

      const [localKey, setLocalKey] = useState(apiKeyInput);

      return (
        <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
          
          {/* Chat Panel Box */}
          {chatOpen && (
            <div className="w-[350px] h-[500px] rounded-2xl glass-card shadow-2xl flex flex-col justify-between mb-4 overflow-hidden animate-fade-in relative z-50">
              
              {/* Header */}
              <div className="px-4 py-3 bg-navy-900 border-b border-slate-800 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-teal-400">⚡</span>
                  <span className="text-xs font-bold text-white tracking-wider">Energy Assistant</span>
                </div>
                
                <div className="flex items-center gap-2">
                  {/* Settings toggle */}
                  <button
                    onClick={() => setShowApiKeySetting(!showApiKeySetting)}
                    className="text-slate-400 hover:text-white text-xs"
                    title="Configure API Key"
                  >
                    ⚙️
                  </button>
                  <button
                    onClick={() => setChatOpen(false)}
                    className="text-slate-400 hover:text-white font-bold text-sm"
                  >
                    ✕
                  </button>
                </div>
              </div>

              {/* API Key Configuration form overlay */}
              {showApiKeySetting && (
                <div className="absolute inset-0 bg-navy-950/95 z-30 p-6 flex flex-col justify-center">
                  <h4 className="text-xs font-bold text-white mb-2 uppercase tracking-wider">Anthropic API Key Setup</h4>
                  <p className="text-[10px] text-slate-400 leading-relaxed mb-4">
                    Claude requires an Anthropic API Key. Input your key below to connect. Cleared keys will fallback to synthetic optimizer mock instructions.
                  </p>
                  
                  <input
                    type="password"
                    value={localKey}
                    onChange={(e) => setLocalKey(e.target.value)}
                    placeholder="sk-ant-..."
                    className="bg-navy-900 border border-slate-800 rounded px-3 py-2 text-xs text-white mb-3 focus:outline-none w-full"
                  />
                  
                  <div className="flex gap-2">
                    <button
                      onClick={() => saveApiKey(localKey)}
                      className="bg-teal-500 hover:bg-teal-400 text-navy-950 font-bold text-xs px-3 py-1.5 rounded"
                    >
                      Save Key
                    </button>
                    <button
                      onClick={() => {
                        saveApiKey('');
                        setLocalKey('');
                      }}
                      className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-3 py-1.5 rounded"
                    >
                      Clear Key
                    </button>
                    <button
                      onClick={() => setShowApiKeySetting(false)}
                      className="bg-navy-900 text-slate-500 text-xs px-3 py-1.5 rounded"
                    >
                      Close
                    </button>
                  </div>
                </div>
              )}

              {/* Chat Messages Area */}
              <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-navy-950/40">
                
                {/* Predefined Quick Questions */}
                {messages.length === 0 && (
                  <div className="space-y-2 py-4">
                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-3">Quick Actions</p>
                    {[
                      "How does the optimizer work?",
                      "Why is my comfort score low?",
                      "How can I save more energy?",
                      "What does carbon footprint mean?",
                      "Explain my current schedule"
                    ].map(q => (
                      <button
                        key={q}
                        onClick={() => handleSendChat(q)}
                        className="w-full text-left bg-navy-900 border border-slate-800/80 rounded-xl px-4 py-2 text-[11px] text-teal-400 hover:bg-teal-500/10 hover:border-teal-500/30 transition-all font-medium"
                      >
                        {q}
                      </button>
                    ))}
                  </div>
                )}

                {/* Message list bubble elements */}
                {messages.map((m, idx) => {
                  const isUser = m.role === 'user';
                  return (
                    <div key={idx} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] rounded-2xl px-4 py-2.5 text-xs leading-relaxed whitespace-pre-wrap ${isUser ? 'bg-teal-500 text-navy-950 font-medium' : 'bg-navy-900 border border-slate-800 text-slate-200'}`}>
                        {m.content}
                      </div>
                    </div>
                  );
                })}

                {/* Typing status indicator */}
                {chatLoading && (
                  <div className="flex justify-start">
                    <div className="bg-navy-900 border border-slate-800 rounded-2xl px-4 py-2 text-xs flex gap-1 items-center">
                      <span className="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style={{ animationDelay: '0s' }} />
                      <span className="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }} />
                      <span className="w-1.5 h-1.5 bg-teal-400 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }} />
                    </div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              {/* Input bottom area */}
              <div className="p-3 border-t border-slate-800 bg-navy-900 flex gap-2">
                <input
                  type="text"
                  value={chatInput}
                  onChange={(e) => setChatInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleSendChat(); }}
                  placeholder="Ask a question..."
                  disabled={chatLoading}
                  className="flex-1 bg-navy-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-teal-500"
                />
                <button
                  onClick={() => handleSendChat()}
                  disabled={chatLoading}
                  className="bg-teal-500 hover:bg-teal-400 text-navy-950 font-bold px-3 py-2 rounded-xl text-xs flex items-center justify-center transition-all disabled:opacity-50"
                >
                  Send
                </button>
              </div>

            </div>
          )}

          {/* Floating trigger CTA button */}
          <button
            onClick={() => setChatOpen(!chatOpen)}
            className="w-14 h-14 rounded-full bg-teal-500 text-navy-950 font-bold text-xl flex items-center justify-center shadow-2xl transition-all active:scale-95 focus:outline-none chatbot-glow cursor-pointer relative z-50 hover:bg-teal-400"
          >
            {chatOpen ? '✕' : '🤖'}
          </button>

        </div>
      );
    }

    // Mount application to DOM root element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
