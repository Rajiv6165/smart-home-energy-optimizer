<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Home Energy Optimizer</title>
  <meta name="description" content="AI-Powered HVAC Optimizer, Carbon footprint tracking, and Home Energy Insights." />
  
  <!-- CSS Styling & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- CDNs for React, ReactDOM, Recharts, Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#060B17',
              900: '#0A0F1E',
              800: '#0D1528',
              700: '#121C33',
              600: '#1E2D54',
              500: '#2A3E75'
            },
            teal: {
              400: '#2DDCB5',
              500: '#00D4AA',
              600: '#00B891'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>

  <style>
    body {
      background-color: #060B17;
      color: #E2E8F0;
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(13, 21, 40, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
    }
    .active-nav {
      background: rgba(0, 212, 170, 0.12);
      color: #00D4AA;
      border-left: 3px solid #00D4AA;
    }
    @keyframes float-bubble {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
      50% { transform: translateY(-40px) translateX(20px); opacity: 0.45; }
      100% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 212, 170, 0.25), transparent);
      filter: blur(12px);
      animation: float-bubble 10s ease-in-out infinite;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #060B17;
    }
    ::-webkit-scrollbar-thumb {
      background: #1E2D54;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00D4AA;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden">
  <div id="root"></div>

  <!-- React Application Source (Transpiled by Babel) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { ResponsiveContainer, AreaChart, Area, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = Recharts;

    const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
      ? 'http://localhost:8000'
      : window.location.origin;

    function App() {
      // Auth State
      const [token, setToken] = useState(localStorage.getItem('jwt_token') || '');
      const [email, setEmail] = useState(localStorage.getItem('jwt_email') || '');
      const [authMode, setAuthMode] = useState('login'); // 'login' or 'register'
      const [authName, setAuthName] = useState('');
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [authError, setAuthError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [successAnimation, setSuccessAnimation] = useState(false);

      // Collapsible Sidebar
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

      // Data States
      const [activeTab, setActiveTab] = useState('dashboard');
      const [schedule, setSchedule] = useState(null);
      const [sensors, setSensors] = useState([]);
      const [latestReadings, setLatestReadings] = useState({});
      const [tips, setTips] = useState([]);
      const [weather, setWeather] = useState([]);
      const [loading, setLoading] = useState(false);
      const [optLoading, setOptLoading] = useState(false);
      const [weatherRefreshLoading, setWeatherRefreshLoading] = useState(false);
      const [error, setError] = useState('');
      const [toasts, setToasts] = useState([]);

      // Auto Refresh Timer states
      const [secondsSinceUpdate, setSecondsSinceUpdate] = useState(0);

      // Sensor modal form state
      const [isAddSensorOpen, setIsAddSensorOpen] = useState(false);
      const [newSensorName, setNewSensorName] = useState('');
      const [newSensorZone, setNewSensorZone] = useState('bedroom');
      const [newSensorKind, setNewSensorKind] = useState('temperature');
      const [newSensorUnits, setNewSensorUnits] = useState('C');
      const [sensorAdding, setSensorAdding] = useState(false);

      // Inline post reading state
      const [activeReadingInputSensorId, setActiveReadingInputSensorId] = useState(null);
      const [postValueMap, setPostValueMap] = useState({});

      // Recommendation Filter category state
      const [recommendationCategory, setRecommendationCategory] = useState('All');

      // Trigger standard API request helper
      async function request(path, options) {
        const url = API_BASE + path;
        const defaultHeaders = {
          'Content-Type': 'application/json'
        };
        if (token) {
          defaultHeaders['Authorization'] = 'Bearer ' + token;
        }

        const fetchOptions = Object.assign({ headers: defaultHeaders }, options);
        const res = await fetch(url, fetchOptions);
        
        if (res.status === 401) {
          handleLogout();
          throw new Error('Session expired. Please sign in again.');
        }

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          const errMsg = body && body.detail ? body.detail : 'An error occurred';
          throw new Error(errMsg);
        }

        return res.json();
      }

      // Show temporary toast notification (handles multiple toasts concurrently)
      function showToast(message, type) {
        const newId = Date.now() + Math.random();
        const newToast = { id: newId, message: message, type: type || 'success' };
        setToasts(function(currentToasts) {
          return currentToasts.concat([newToast]);
        });
        setTimeout(function() {
          setToasts(function(currentToasts) {
            return currentToasts.filter(function(t) { return t.id !== newId; });
          });
        }, 4000);
      }

      // Fetch all latest readings for sensors
      async function fetchLatestReadings(sensorList) {
        const readingsObj = {};
        const promises = sensorList.map(async (sensor) => {
          try {
            const res = await request('/sensors/' + sensor.id + '/readings?limit=1');
            if (res && res.data && res.data.length > 0) {
              readingsObj[sensor.id] = res.data[0];
            }
          } catch (e) {
            console.error('Error fetching reading for sensor ' + sensor.id, e);
          }
        });
        await Promise.all(promises);
        setLatestReadings(readingsObj);
      }

      // Fetch all dashboard data
      async function fetchAllData() {
        if (!token) return;
        setLoading(true);
        setError('');
        try {
          // Fetch latest schedule
          const schedRes = await request('/schedules/latest');
          if (schedRes && schedRes.data) {
            setSchedule(schedRes.data);
          }

          // Fetch sensors
          const sensorRes = await request('/sensors');
          if (sensorRes && sensorRes.data) {
            setSensors(sensorRes.data);
            // Parallel fetch latest reading per sensor
            fetchLatestReadings(sensorRes.data);
          }

          // Fetch AI tips
          const tipsRes = await request('/insights/tips');
          if (tipsRes && tipsRes.data) {
            setTips(tipsRes.data);
          }

          // Fetch weather forecast
          const weatherRes = await request('/weather/current');
          if (weatherRes && weatherRes.data) {
            setWeather(weatherRes.data);
          }

          setSecondsSinceUpdate(0);
        } catch (err) {
          setError(err.message || 'Failed to load data');
          showToast(err.message || 'Data retrieval failed', 'error');
        } finally {
          setLoading(false);
        }
      }

      // Setup 60-second auto-refresh and elapsed counter
      useEffect(() => {
        if (!token) return;
        
        fetchAllData();

        const timer = setInterval(() => {
          setSecondsSinceUpdate(function(prev) {
            if (prev >= 59) {
              fetchAllData();
              return 0;
            }
            return prev + 1;
          });
        }, 1000);

        return () => clearInterval(timer);
      }, [token]);

      // Authentication actions
      async function handleAuth(e) {
        e.preventDefault();
        setAuthLoading(true);
        setAuthError('');
        try {
          const path = authMode === 'login' ? '/auth/login' : '/auth/register';
          // Send only email/password to match backend payload spec
          const res = await request(path, {
            method: 'POST',
            body: JSON.stringify({ email: authEmail, password: authPassword })
          });

          if (res && res.access_token) {
            setSuccessAnimation(true);
            setTimeout(() => {
              localStorage.setItem('jwt_token', res.access_token);
              localStorage.setItem('jwt_email', res.email);
              setToken(res.access_token);
              setEmail(res.email);
              setSuccessAnimation(false);
              showToast('Access granted! Welcome ' + (authName || res.email), 'success');
              // Clear inputs
              setAuthName('');
              setAuthEmail('');
              setAuthPassword('');
            }, 1500);
          }
        } catch (err) {
          setAuthError(err.message || 'Authentication failed');
          showToast(err.message || 'Authentication failed', 'error');
        } finally {
          setAuthLoading(false);
        }
      }

      function handleLogout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('jwt_email');
        setToken('');
        setEmail('');
        setSchedule(null);
        setSensors([]);
        setLatestReadings({});
        setTips([]);
        setWeather([]);
        showToast('Signed out successfully', 'info');
      }

      // Optimize actions
      async function handleRunOptimizer() {
        setOptLoading(true);
        try {
          const res = await request('/optimizer/run', { method: 'POST' });
          if (res && res.data) {
            setSchedule(res.data);
            showToast('AI optimizer run complete. Target values updated.', 'success');
            // Refresh insights and history
            const tipsRes = await request('/insights/tips');
            if (tipsRes && tipsRes.data) setTips(tipsRes.data);
            setSecondsSinceUpdate(0);
          }
        } catch (err) {
          showToast(err.message || 'Optimization trigger failed', 'error');
        } finally {
          setOptLoading(false);
        }
      }

      // Refresh Weather forecast
      async function handleRefreshWeather() {
        setWeatherRefreshLoading(true);
        try {
          const res = await request('/weather/refresh', { method: 'POST' });
          if (res && res.data) {
            showToast('Weather forecast successfully updated!', 'success');
            // Fetch updated current weather
            const weatherRes = await request('/weather/current');
            if (weatherRes && weatherRes.data) {
              setWeather(weatherRes.data);
            }
          }
        } catch (err) {
          showToast(err.message || 'Weather refresh failed', 'error');
        } finally {
          setWeatherRefreshLoading(false);
        }
      }

      // Add New Sensor
      async function handleAddSensor(e) {
        e.preventDefault();
        setSensorAdding(true);
        try {
          const res = await request('/sensors', {
            method: 'POST',
            body: JSON.stringify({
              name: newSensorName,
              zone: newSensorZone,
              kind: newSensorKind,
              units: newSensorUnits
            })
          });

          if (res && res.data) {
            showToast('Sensor "' + newSensorName + '" added successfully!', 'success');
            setIsAddSensorOpen(false);
            // Reset fields
            setNewSensorName('');
            setNewSensorUnits('C');
            // Refetch sensor list
            const sensorRes = await request('/sensors');
            if (sensorRes && sensorRes.data) {
              setSensors(sensorRes.data);
              fetchLatestReadings(sensorRes.data);
            }
          }
        } catch (err) {
          showToast(err.message || 'Failed to add sensor', 'error');
        } finally {
          setSensorAdding(false);
        }
      }

      // Post synthetic sensor reading value
      async function handlePostReading(sensorId) {
        const valStr = postValueMap[sensorId];
        const value = parseFloat(valStr);
        if (isNaN(value)) {
          showToast('Please specify a valid numeric coordinate', 'error');
          return;
        }

        try {
          const res = await request('/sensors/' + sensorId + '/readings', {
            method: 'POST',
            body: JSON.stringify({ value: value })
          });
          if (res && res.data) {
            showToast('Reading value successfully ingested!', 'success');
            
            // Update single reading locally
            const updatedReadings = Object.assign({}, latestReadings);
            updatedReadings[sensorId] = res.data;
            setLatestReadings(updatedReadings);

            // Hide inputs
            setActiveReadingInputSensorId(null);
            const updatedInputs = Object.assign({}, postValueMap);
            updatedInputs[sensorId] = '';
            setPostValueMap(updatedInputs);
          }
        } catch (err) {
          showToast(err.message || 'Ingestion failed', 'error');
        }
      }

      // Format timestamp helper
      function formatTime(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      // Format full date helper
      function formatDate(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        return date.toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      // Weather condition calculator
      function getWeatherIcon(timestamp, solar) {
        const date = new Date(timestamp);
        const hour = date.getHours();
        if (hour >= 6 && hour < 20) {
          return solar > 300 ? '☀️' : '⛅';
        }
        return '🌙';
      }

      function isCurrentHour(timestamp) {
        const cardDate = new Date(timestamp);
        const nowDate = new Date();
        return cardDate.getDate() === nowDate.getDate() && cardDate.getHours() === nowDate.getHours();
      }

      // If user is not authenticated, render Login/Register panel
      if (!token) {
        return (
          <div className="relative flex min-h-screen items-center justify-center p-4 overflow-hidden" style={{ backgroundColor: '#060B17' }}>
            
            {/* Animated floating particles in background */}
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="bubble w-40 h-40 top-10 left-10" style={{ animationDelay: '0s' }}></div>
              <div className="bubble w-60 h-60 bottom-10 right-10" style={{ animationDelay: '-2s' }}></div>
              <div className="bubble w-32 h-32 top-1/2 left-1/3" style={{ animationDelay: '-4s' }}></div>
              <div className="bubble w-48 h-48 bottom-1/3 right-1/4" style={{ animationDelay: '-6s' }}></div>
            </div>

            {/* Success Overlay Animation */}
            {successAnimation && (
              <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-navy-950/90 transition-all duration-500">
                <div className="w-20 h-20 bg-teal-500 rounded-full flex items-center justify-center text-4xl font-bold text-navy-950 animate-ping">
                  ✓
                </div>
                <h2 className="text-xl font-bold text-white mt-6 tracking-wide">Syncing Credentials...</h2>
                <p className="text-xs text-slate-400 mt-1">Booting Smart Energy Dashboard</p>
              </div>
            )}

            {/* Error alerts */}
            <div className="fixed top-5 right-5 z-50 flex flex-col gap-2">
              {toasts.map(t => (
                <div key={t.id} className="flex items-center gap-3 glass-card px-4 py-3 rounded-xl border-l-4 shadow-2xl transition-all"
                  style={{ borderLeftColor: t.type === 'error' ? '#FB7185' : '#00D4AA' }}>
                  <span className="text-lg">{t.type === 'error' ? '❌' : 'ℹ️'}</span>
                  <p className="text-xs font-semibold text-white">{t.message}</p>
                </div>
              ))}
            </div>

            {/* Card Frame */}
            <div className="w-full max-w-md p-8 rounded-2xl glass-card relative z-10 overflow-hidden shadow-2xl" style={{ backdropFilter: 'blur(20px)' }}>
              <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-500 via-indigo-500 to-emerald-400" />
              
              <div className="text-center mb-8">
                <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-teal-500 text-navy-950 font-black text-2xl mb-3 shadow-lg shadow-teal-500/20">
                  ⚡
                </div>
                <h1 className="text-2xl font-bold text-white leading-tight">Energy Optimizer</h1>
                <p className="text-sm text-slate-400 mt-1">AI-Powered Home Energy & Carbon Insights</p>
              </div>

              {/* Tab Selector */}
              <div className="flex border-b border-slate-800/80 mb-6">
                <button
                  onClick={() => { setAuthMode('login'); setAuthError(''); }}
                  className={`flex-1 pb-3 text-sm font-semibold transition-all ${authMode === 'login' ? 'text-teal-500 border-b-2 border-teal-500' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  🔐 Sign In
                </button>
                <button
                  onClick={() => { setAuthMode('register'); setAuthError(''); }}
                  className={`flex-1 pb-3 text-sm font-semibold transition-all ${authMode === 'register' ? 'text-teal-500 border-b-2 border-teal-500' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  ✨ Register
                </button>
              </div>

              <form onSubmit={handleAuth} className="space-y-4">
                {authError && (
                  <div className="p-3 text-xs bg-red-950/50 border border-red-500/50 text-red-300 rounded-lg">
                    {authError}
                  </div>
                )}

                {authMode === 'register' && (
                  <div>
                    <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Full Name</label>
                    <input
                      type="text"
                      required
                      value={authName}
                      onChange={(e) => setAuthName(e.target.value)}
                      placeholder="John Doe"
                      className="w-full bg-navy-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all"
                    />
                  </div>
                )}
                
                <div>
                  <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
                  <input
                    type="email"
                    required
                    value={authEmail}
                    onChange={(e) => setAuthEmail(e.target.value)}
                    placeholder="name@domain.com"
                    className="w-full bg-navy-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all"
                  />
                </div>

                <div>
                  <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
                  <div className="relative">
                    <input
                      type={showPassword ? 'text' : 'password'}
                      required
                      value={authPassword}
                      onChange={(e) => setAuthPassword(e.target.value)}
                      placeholder="••••••••"
                      className="w-full bg-navy-900 border border-slate-800 rounded-xl pl-4 pr-12 py-3 text-sm text-white focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all"
                    />
                    <button
                      type="button"
                      onClick={() => setShowPassword(!showPassword)}
                      className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors focus:outline-none text-xs font-bold"
                    >
                      {showPassword ? 'HIDE' : 'SHOW'}
                    </button>
                  </div>
                </div>

                <button
                  type="submit"
                  disabled={authLoading}
                  className="w-full bg-teal-500 text-navy-950 font-bold text-sm rounded-xl py-3 shadow-lg shadow-teal-500/10 hover:shadow-teal-500/25 transition-all hover:bg-teal-400 active:scale-[0.98] disabled:opacity-50 flex items-center justify-center gap-2"
                >
                  {authLoading && (
                    <span className="inline-block animate-spin w-4 h-4 border-2 border-navy-950 border-t-transparent rounded-full" />
                  )}
                  <span>{authLoading ? 'Verifying Credentials...' : authMode === 'login' ? 'Access Dashboard' : 'Create Account'}</span>
                </button>
              </form>
            </div>
          </div>
        );
      }

      // Format blocks for Recharts consumption
      const chartData = schedule && schedule.blocks
        ? schedule.blocks.map(b => ({
            time: formatTime(b.timestamp),
            setpoint: b.target_temp_c,
            load: b.estimated_kwh
          }))
        : [];

      // Deduplicate recommendations by title
      const uniqueTips = [];
      const seenTitles = {};
      tips.forEach(t => {
        if (!seenTitles[t.title]) {
          seenTitles[t.title] = true;
          uniqueTips.push(t);
        }
      });

      // Filter tips based on tab selection
      const filteredTips = uniqueTips.filter(t => {
        if (recommendationCategory === 'All') return true;
        return t.category.toLowerCase() === recommendationCategory.toLowerCase();
      });

      // Calculate total potential savings
      let totalPotentialSavings = 0;
      filteredTips.forEach(t => {
        totalPotentialSavings += Math.abs(t.estimated_savings_kwh);
      });

      // Calculations for Dashboard Stats Row
      const totalBlocks = schedule && schedule.blocks ? schedule.blocks.length : 0;
      let avgSetpointVal = 0;
      let peakLoadVal = 0;
      let peakLoadHourStr = '--';
      let activeHvacHours = 0;

      if (schedule && schedule.blocks) {
        let tempSum = 0;
        schedule.blocks.forEach(b => {
          tempSum += b.target_temp_c;
          if (b.estimated_kwh > peakLoadVal) {
            peakLoadVal = b.estimated_kwh;
            peakLoadHourStr = formatTime(b.timestamp);
          }
          if (b.target_hvac_mode !== 'off' && b.target_hvac_mode !== 'auto') {
            activeHvacHours += 1;
          }
        });
        avgSetpointVal = totalBlocks > 0 ? (tempSum / totalBlocks).toFixed(1) : 0;
      }

      // Calculations for Weather summary
      let weatherMinTemp = 999;
      let weatherMaxTemp = -999;
      weather.forEach(w => {
        if (w.temperature_c < weatherMinTemp) weatherMinTemp = w.temperature_c;
        if (w.temperature_c > weatherMaxTemp) weatherMaxTemp = w.temperature_c;
      });
      const todayMinMax = weather.length > 0
        ? "Today: " + weatherMinTemp.toFixed(1) + "°C — " + weatherMaxTemp.toFixed(1) + "°C"
        : "";

      // Group sensors by zone
      const sensorsByZone = {};
      sensors.forEach(s => {
        const zone = s.zone || 'other';
        if (!sensorsByZone[zone]) {
          sensorsByZone[zone] = [];
        }
        sensorsByZone[zone].push(s);
      });

      return (
        <div className="flex min-h-screen bg-navy-950">
          
          {/* Toast Notification Container */}
          <div className="fixed top-5 right-5 z-50 flex flex-col gap-2">
            {toasts.map(t => (
              <div key={t.id} className="flex items-center gap-3 glass-card px-4 py-3.5 rounded-xl border-l-4 shadow-2xl transition-all"
                style={{ borderLeftColor: t.type === 'error' ? '#FB7185' : '#00D4AA' }}>
                <span className="text-lg">{t.type === 'error' ? '❌' : 'ℹ️'}</span>
                <p className="text-xs font-semibold text-white">{t.message}</p>
              </div>
            ))}
          </div>

          {/* Left Navigation Sidebar */}
          <aside className={`border-r border-slate-800 bg-navy-900 flex flex-col justify-between transition-all duration-300 ${sidebarCollapsed ? 'w-20' : 'w-64'}`}>
            <div>
              {/* Brand Header */}

                            key={cat}
                            onClick={() => setRecommendationCategory(cat)}
                            className={`px-4 py-2 rounded-xl text-xs font-semibold transition-all ${recommendationCategory === cat ? 'bg-teal-500 text-navy-950 font-bold shadow-md shadow-teal-500/10' : 'bg-navy-800 text-slate-400 hover:text-white'}`}
                          >
                            {cat}
                          </button>
                        ))}
                      </div>

                      <div className="text-right">
                        <span className="text-xs text-slate-400">Category Potential Savings:</span>
                        <span className="text-sm font-bold text-teal-400 block mt-0.5">
                          {totalPotentialSavings.toFixed(1)} kWh across {filteredTips.length} recommendation(s)
                        </span>
                      </div>
                    </div>

                    {/* Recommendations grid */}
                    {filteredTips.length > 0 ? (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {filteredTips.map(tip => (
                          <div key={tip.id} className="p-6 rounded-2xl glass-card relative overflow-hidden flex flex-col justify-between border-l-4 border-l-teal-500">
                            <div>
                              <div className="flex items-center justify-between mb-4">
                                <span className={`px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider ${tip.category === 'schedule' ? 'bg-purple-950 text-purple-400 border border-purple-800/50' : tip.category === 'comfort' ? 'bg-amber-950 text-amber-400 border border-amber-800/50' : 'bg-slate-900 text-slate-400'}`}>
                                  {tip.category}
                                </span>
                              </div>
                              <h3 className="text-sm font-bold text-white mb-2">{tip.title}</h3>
                              <p className="text-xs text-slate-400 leading-relaxed mb-4">{tip.detail}</p>
                              
                              {/* Confidence Progress Bar */}
                              <div className="mb-6">
                                <div className="flex justify-between text-[10px] text-slate-500 font-bold mb-1">
                                  <span>Confidence Index</span>
                                  <span>{Math.round(tip.confidence * 100)}%</span>
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                                  <div className="bg-teal-500 h-full transition-all" style={{ width: Math.round(tip.confidence * 100) + '%' }} />
                                </div>
                              </div>
                            </div>
                            <div className="pt-4 border-t border-slate-800/60 flex items-center justify-between">
                              <span className="text-xs text-slate-400">Savings Impact:</span>
                              <span className="text-sm font-bold text-teal-400">+{Math.abs(tip.estimated_savings_kwh)} kWh</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="p-12 text-center rounded-2xl glass-card">
                        <span className="text-3xl block mb-2">💡</span>
                        <p className="text-sm font-medium text-slate-400">No suggestions compiled by the optimization engine yet.</p>
                        <p className="text-xs text-slate-500 mt-1">Insights compile automatically after a schedule runs.</p>
                      </div>
                    )}
                  </div>
                )}

                {/* Weather Forecast Tab Content */}
                {activeTab === 'weather' && (
                  <div className="space-y-8">
                    
                    {/* Min/Max temp block */}
                    {weather.length > 0 && (
                      <div className="p-5 rounded-2xl bg-navy-900 border border-slate-800/80 flex items-center justify-between">
                        <div>
                          <h3 className="text-sm font-bold text-white uppercase tracking-wider">Local Temperature Range</h3>
                          <p className="text-xs text-slate-400 mt-1">Calculated min/max limits over the 24h forecast run</p>
                        </div>
                        <div className="text-base font-bold text-teal-400 tracking-wider">
                          {todayMinMax}
                        </div>
                      </div>
                    )}

                    {/* Temperature trend Line Chart */}
                    {weather.length > 0 && (
                      <div className="p-6 rounded-2xl glass-card">
                        <h3 className="text-sm font-semibold text-white mb-6 uppercase tracking-wider">24-Hour Temperature forecast curve</h3>
                        <div className="h-60">
                          <ResponsiveContainer width="100%" height="100%">
                            <LineChart data={weather.map(w => ({ time: formatTime(w.timestamp), temp: w.temperature_c }))} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
                              <XAxis dataKey="time" stroke="#64748B" fontSize={11} />
                              <YAxis stroke="#64748B" fontSize={11} domain={['auto', 'auto']} unit="°C" />
                              <Tooltip contentStyle={{ backgroundColor: '#0D1528', borderColor: 'rgba(255,255,255,0.1)', color: '#fff', fontSize: '12px' }} />
                              <Line type="monotone" dataKey="temp" stroke="#00D4AA" strokeWidth={3} dot={{ r: 3 }} activeDot={{ r: 5 }} />
                            </LineChart>
                          </ResponsiveContainer>
                        </div>
                      </div>
                    )}

                    {/* Hourly weather Grid */}
                    {weather.length > 0 ? (
                      <div className="grid grid-cols-2 md:grid-cols-6 gap-4">
                        {weather.map((w, idx) => {
                          const active = isCurrentHour(w.timestamp);
                          return (
                            <div key={idx} className={`p-4 rounded-xl text-center space-y-3 bg-navy-900/60 border ${active ? 'border-teal-500 shadow-lg shadow-teal-500/5' : 'border-slate-800/60'}`}>
                              <div className="text-[10px] font-bold text-slate-400">{formatTime(w.timestamp)}</div>
                              <div className="text-2xl">
                                {getWeatherIcon(w.timestamp, w.solar_irradiance_wm2)}
                              </div>
                              <div className="text-base font-bold text-white">{w.temperature_c}°C</div>
                              <div className="text-[9px] text-slate-500 font-semibold uppercase">
                                Rad: {Math.round(w.solar_irradiance_wm2)} W/m²
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="p-12 text-center rounded-2xl glass-card">
                        <span className="text-3xl block mb-2">🌤️</span>
                        <p className="text-sm font-medium text-slate-400">No local weather forecast data downloaded yet.</p>
                      </div>
                    )}
                  </div>
                )}

              </div>
            )}
          </main>

        </div>
      );
    }

    // Mount application to DOM root element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
